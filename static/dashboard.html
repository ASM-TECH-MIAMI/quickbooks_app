<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CFO Dashboard</title>
  <script src="/static/sidebar.js"></script>
  <style>
    .page { padding: 32px 28px; max-width: 1400px; margin: 0 auto; }

    /* ── Page header ─────────────────────────────────────────────────────── */
    .page-hd {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom: 28px;
    }
    .page-title { font-size:24px; font-weight:700; color:var(--t1); }
    .page-sub   { font-size:13px; color:var(--t3); margin-top:3px; }
    .refresh-btn {
      display:flex; align-items:center; gap:7px;
      background:var(--s2); border:1px solid var(--sep);
      border-radius:10px; color:var(--t2); font-family:var(--font);
      font-size:13px; font-weight:500; padding:8px 16px;
      cursor:pointer; transition:background .13s, color .13s;
    }
    .refresh-btn:hover { background:var(--s3); color:var(--t1); }

    /* ── Loading ─────────────────────────────────────────────────────────── */
    .loading {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:14px; padding:80px 0; color:var(--t3);
    }
    .spinner { animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Company grid ────────────────────────────────────────────────────── */
    .co-grid {
      display:grid; gap:16px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }

    /* ── Company card ────────────────────────────────────────────────────── */
    .co-card {
      background:var(--s2); border:1px solid var(--sep);
      border-radius:18px; padding:22px;
      transition:border-color .2s, transform .2s;
    }
    .co-card:hover { border-color:var(--s4); transform:translateY(-1px); }

    .co-card-hd {
      display:flex; align-items:flex-start;
      justify-content:space-between; margin-bottom:18px;
    }
    .co-name  { font-size:15px; font-weight:600; color:var(--t1); line-height:1.3; }
    .co-period{ font-size:11px; color:var(--t3); margin-top:3px; }
    .live-badge {
      display:flex; align-items:center; gap:5px;
      font-size:11px; font-weight:600;
      color:var(--green); background:var(--green-d);
      padding:3px 9px; border-radius:999px;
    }
    .live-dot { width:5px; height:5px; border-radius:50%; background:var(--green); }

    .co-metrics { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .metric-box {}
    .metric-lbl { font-size:11px; color:var(--t3); margin-bottom:4px; font-weight:500; }
    .metric-val { font-size:20px; font-weight:700; color:var(--t1); }

    /* Month status strip */
    .month-strip { margin-top:18px; padding-top:16px; border-top:1px solid var(--sep); }
    .strip-hd {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:10px;
    }
    .strip-lbl { font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--t3); }
    .strip-sum { font-size:11px; }
    .month-pills { display:flex; flex-wrap:wrap; gap:5px; }
    .mpill {
      font-size:10px; font-weight:600; padding:3px 8px;
      border-radius:6px; white-space:nowrap;
    }
    .mpill-closed  { background:var(--green-d); color:var(--green); }
    .mpill-open    { background:var(--orange-d); color:var(--orange); }
    .mpill-current { background:var(--blue-d); color:var(--blue);
                     box-shadow:0 0 0 1px var(--blue-b); }

    .co-chat-link {
      display:flex; align-items:center; justify-content:center; gap:7px;
      margin-top:16px; padding:9px; border-radius:10px;
      background:var(--s3); border:none; color:var(--t2);
      font-family:var(--font); font-size:13px; font-weight:500;
      cursor:pointer; text-decoration:none;
      transition:background .13s, color .13s;
    }
    .co-chat-link:hover { background:var(--s4); color:var(--t1); }

    /* ── Bottom row ──────────────────────────────────────────────────────── */
    .bottom-row { display:grid; gap:16px; grid-template-columns:280px 1fr; margin-top:20px; }
    @media(max-width:900px){ .bottom-row { grid-template-columns:1fr; } }

    /* Totals card */
    .totals-card { background:var(--s2); border:1px solid var(--sep); border-radius:18px; padding:22px; }
    .total-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--sep); }
    .total-row:last-child { border-bottom:none; }
    .total-lbl { font-size:13px; color:var(--t2); }
    .total-val { font-size:14px; font-weight:600; }

    /* Deadlines card */
    .dl-card { background:var(--s2); border:1px solid var(--sep); border-radius:18px; padding:22px; }
    .dl-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 0; border-bottom:1px solid var(--sep);
    }
    .dl-row:last-child { border-bottom:none; }
    .dl-form { font-size:11px; font-family:'SF Mono','Fira Mono',monospace; background:var(--s3); color:var(--t2); padding:2px 7px; border-radius:5px; }
    .dl-desc { font-size:13px; color:var(--t1); }
    .dl-date { font-size:12px; font-weight:600; }

    .overdue-block { margin-top:14px; background:var(--red-d); border:1px solid rgba(255,69,58,0.25); border-radius:12px; padding:14px 16px; }
    .overdue-title { font-size:12px; font-weight:700; color:var(--red); margin-bottom:8px; }
    .overdue-row   { display:flex; justify-content:space-between; padding:4px 0; font-size:13px; }
  </style>
</head>
<body>

<div class="page">
  <!-- Header -->
  <div class="page-hd">
    <div>
      <div class="page-title">CFO Dashboard</div>
      <div class="page-sub" id="as-of">Loading live data…</div>
    </div>
    <button class="refresh-btn" onclick="load()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <svg class="spinner" width="28" height="28" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="var(--s4)" stroke-width="3"/>
      <path d="M12 2a10 10 0 0 1 10 10" stroke="var(--blue)" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <span style="font-size:14px">Loading company data…</span>
  </div>

  <!-- Content -->
  <div id="content" style="display:none;">
    <div class="co-grid" id="co-grid"></div>
    <div class="bottom-row">
      <div class="totals-card">
        <div class="sec-label">Portfolio Totals</div>
        <div id="totals"></div>
      </div>
      <div class="dl-card">
        <div class="sec-label">IRS Deadlines — Next 60 Days</div>
        <div id="deadlines"></div>
        <div id="overdue"></div>
      </div>
    </div>
  </div>
</div>

<script>
function fmt(n) {
  if (n == null) return '—';
  const abs = Math.abs(n);
  const s = abs>=1e6?(abs/1e6).toFixed(2)+'M':abs>=1e3?(abs/1e3).toFixed(1)+'K':abs.toFixed(0);
  return (n<0?'-$':'$')+s;
}
function mc(v) { return v>=0?'c-green':'c-red'; }
function mm(v) { return v>=20?'c-green':v>=5?'c-orange':'c-red'; }

function monthPills(ms) {
  if (!ms?.length) return '';
  const closed = ms.filter(m=>m.status==='closed').length;
  const open   = ms.filter(m=>m.status==='open').length;
  const total_uncat = ms.reduce((s,m)=>s+(m.uncategorized>0?m.uncategorized:0),0);
  const sumColor = open>0||total_uncat>0 ? 'c-orange' : 'c-green';
  const sumText  = open>0
    ? `<span class="${sumColor}" style="font-size:11px">${open} open · ${total_uncat} uncat</span>`
    : `<span class="c-green" style="font-size:11px">All ${closed} closed ✓</span>`;
  const pills = ms.map(m => {
    if (m.status==='closed') return `<span class="mpill mpill-closed" title="${m.name} — closed">✓ ${m.name}</span>`;
    if (m.status==='current') {
      const uc = m.uncategorized>0?` (${m.uncategorized})`:'';
      return `<span class="mpill mpill-current" title="${m.name} in progress">→ ${m.name}${uc}</span>`;
    }
    const uc = m.uncategorized>0?` ${m.uncategorized}`:' ✓';
    return `<span class="mpill mpill-open" title="${m.name} open">! ${m.name}${uc}</span>`;
  }).join('');
  return `<div class="month-strip">
    <div class="strip-hd"><span class="strip-lbl">Book Status</span>${sumText}</div>
    <div class="month-pills">${pills}</div>
  </div>`;
}

function makeCard(c, i) {
  const colors = QB.COLORS;
  const col = colors[i%4];
  if (c.error) return `
    <div class="co-card" style="border-color:var(--red-d)">
      <div class="co-name">${c.name}</div>
      <div style="color:var(--red);font-size:13px;margin-top:8px">⚠ ${c.error}</div>
    </div>`;
  return `
  <div class="co-card" style="border-top:2px solid ${col}22">
    <div class="co-card-hd">
      <div>
        <div class="co-name">${c.name}</div>
        <div class="co-period">${c.period}</div>
      </div>
      <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    </div>
    <div class="co-metrics">
      <div class="metric-box">
        <div class="metric-lbl">Revenue</div>
        <div class="metric-val">${fmt(c.revenue)}</div>
      </div>
      <div class="metric-box">
        <div class="metric-lbl">Net Income</div>
        <div class="metric-val ${mc(c.net_income)}">${fmt(c.net_income)}</div>
      </div>
      <div class="metric-box">
        <div class="metric-lbl">Net Margin</div>
        <div class="metric-val ${mm(c.margin_pct)}">${c.margin_pct}%</div>
      </div>
      <div class="metric-box">
        <div class="metric-lbl">Cash</div>
        <div class="metric-val">${fmt(c.cash)}</div>
      </div>
    </div>
    ${monthPills(c.month_status)}
    <a href="/?company=${encodeURIComponent(c.name)}" class="co-chat-link">
      💬 Ask CFO AI about ${c.name.split(' ')[0]}
    </a>
  </div>`;
}

function renderTotals(cos) {
  const valid = cos.filter(c=>!c.error);
  const rv  = valid.reduce((s,c)=>s+(c.revenue||0),0);
  const ni  = valid.reduce((s,c)=>s+(c.net_income||0),0);
  const ca  = valid.reduce((s,c)=>s+(c.cash||0),0);
  const am  = valid.length ? (valid.reduce((s,c)=>s+(c.margin_pct||0),0)/valid.length).toFixed(1):0;
  const rows=[
    ['Total Revenue',    fmt(rv),  ''],
    ['Total Net Income', fmt(ni),  mc(ni)],
    ['Total Cash',       fmt(ca),  ''],
    ['Avg Net Margin',   am+'%',   mm(parseFloat(am))],
    ['Companies',        valid.length+' connected','c-dim'],
  ];
  document.getElementById('totals').innerHTML = rows.map(([l,v,cls])=>`
    <div class="total-row">
      <span class="total-lbl">${l}</span>
      <span class="total-val ${cls}">${v}</span>
    </div>`).join('');
}

function renderDeadlines(dl, od) {
  const el = document.getElementById('deadlines');
  if (!dl.length) { el.innerHTML='<p style="font-size:13px;color:var(--t3)">No deadlines in 60 days.</p>'; }
  else el.innerHTML = dl.map(d=>{
    const days = Math.ceil((new Date(d.due_date)-new Date())/86400000);
    const dc   = days<=7?'c-red':days<=21?'c-orange':'c-dim';
    return `<div class="dl-row">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="dl-form">${d.form}</span>
        <span class="dl-desc">${d.description}</span>
      </div>
      <div style="text-align:right">
        <div class="dl-date ${dc}">${d.due_date}</div>
        <div style="font-size:11px;color:var(--t3)">${days}d</div>
      </div>
    </div>`;
  }).join('');

  const oe = document.getElementById('overdue');
  if (od.length) oe.innerHTML=`
    <div class="overdue-block">
      <div class="overdue-title">⚠ ${od.length} Overdue Filing${od.length>1?'s':''}</div>
      ${od.slice(0,3).map(d=>`<div class="overdue-row">
        <span style="color:var(--red);font-size:13px"><span style="font-family:monospace;font-size:11px">${d.form}</span> — ${d.description}</span>
        <span style="color:var(--red);font-size:12px;font-weight:600">${d.due_date}</span>
      </div>`).join('')}
    </div>`;
}

async function load() {
  document.getElementById('loading').style.display='flex';
  document.getElementById('content').style.display='none';
  try {
    const d = await fetch('/api/dashboard').then(r=>r.json());
    document.getElementById('as-of').textContent = `Live data · as of ${d.as_of}`;
    document.getElementById('co-grid').innerHTML = d.companies.map((c,i)=>makeCard(c,i)).join('');
    renderTotals(d.companies);
    renderDeadlines(d.deadlines, d.overdue);
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
  } catch(e) {
    document.getElementById('loading').innerHTML=`<div style="color:var(--red)">⚠ ${e.message}</div>`;
  }
}

QB.init({ active:'dashboard' });
load();
</script>
</body>
</html>
